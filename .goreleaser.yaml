version: 2

builds:
  - main: ./cmd/tmux-manager
    binary: tmux-manager
    ldflags:
      - -s -w -X github.com/dohwi/tmux-manager/internal/cli.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    replacements:
      darwin: macos
      amd64: intel
      arm64: silicon
    files:
      - README.md

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^ui:'
