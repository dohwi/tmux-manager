set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g status-position bottom

# Catppuccin Mocha palette
#   base     #1e1e2e    text     #cdd6f4    subtext  #a6adc8
#   overlay0 #6c7086    surface0 #313244    surface1 #45475a
#   lavender #b4befe    green    #a6e3a1    yellow   #f9e2af
#   red      #f38ba8
set -g status-style bg=#1e1e2e,fg=#cdd6f4
set -g status-left ""
set -g status-left-length 10
set -g status-right "#[fg=#6c7086]│ #[fg=#b4befe,bold]#S #[fg=#6c7086]%Y-%m-%d #[fg=#a6e3a1]%H:%M "
set -g status-right-length 80

# Window state indicators
#   idle    : gray  ○  no recent activity
#   working : yellow ●  producing output
#   done    : green  ✓  produced output, then silent for monitor-silence seconds
set -g window-status-style default
set -g window-status-last-style default
set -g window-status-activity-style default
set -g window-status-bell-style fg=#f38ba8
set -g window-status-current-style fg=#cdd6f4,bg=#313244

set -g window-status-format " #{?#{&&:#{window_activity_flag},#{window_silence_flag}},#[fg=#a6e3a1]✓ #[fg=#a6e3a1]#I #W,#{?#{window_activity_flag},#[fg=#f9e2af]● #[fg=#f9e2af]#I #W,#[fg=#6c7086]○ #[fg=#6c7086]#I #W}}#[default] "
set -g window-status-current-format " #{?#{&&:#{window_activity_flag},#{window_silence_flag}},#[fg=#a6e3a1]✓ #[fg=#a6e3a1]#I #[bold]#W,#{?#{window_activity_flag},#[fg=#f9e2af]● #[fg=#f9e2af]#I #[bold]#W,#[fg=#b4befe]● #[fg=#cdd6f4]#I #[bold]#W}}#[default] "
set -g window-status-separator " "

# Activity monitoring: visual indicators in status bar, plus one bell on done
set -g monitor-activity on
set -g monitor-silence 3
set -g monitor-bell off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
# Use "other" so alert-* hooks fire for inactive panes while keeping visual alerts off.
set -g activity-action other
set -g silence-action other
# Forward bells from non-current panes to the client
set -g bell-action other

# Reset the done-bell flag as soon as a pane starts working again
set-hook -g alert-activity "run-shell 'tmux set -pt #{pane_id} @tmuxmgr_done_bell 0'"
# Ring the terminal bell once when a window becomes done (activity followed by silence),
# then mark that pane so we don't repeat the bell while it remains done.
set-hook -g alert-silence "run-shell 'if [ #{window_activity_flag} -eq 1 ] && [ #{window_silence_flag} -eq 1 ] && [ \"#{@tmuxmgr_done_bell}\" != 1 ]; then tmux send-keys -t #{pane_id} C-g; tmux set -pt #{pane_id} @tmuxmgr_done_bell 1; fi'"
